---
- name: Automate Radware Alteon Config using Official Collection
  hosts: localhost
  gather_facts: false
  vars:
    alteon_ip: "192.168.210.91"

  tasks:
    # -------------------------------------------------------------
    # STEP 1: CREATE MULTIPLE REAL SERVERS
    # -------------------------------------------------------------
    - name: Create Real Servers
      radware.radware_modules.alteon_config_server:
        provider:
          server: "{{ alteon_ip }}"
          user: "{{ radware_username }}"
          password: "{{ radware_password }}"
          validate_certs: false
        state: present
        parameters:
          index: "{{ server_name }}_{{ item.split('.')[-1] }}"
          ip_address: "{{ item }}"
          state: enabled
      loop: "{{ server_ips.split(',') | map('trim') | list }}"

    # -------------------------------------------------------------
    # STEP 2: MAP ALL SERVERS TO THE GROUP AT ONCE
    # -------------------------------------------------------------
    - name: Add Real Servers to Server Group
      radware.radware_modules.alteon_config_server_group:
        provider:
          server: "{{ alteon_ip }}"
          user: "{{ radware_username }}"
          password: "{{ radware_password }}"
          validate_certs: false
        state: append
        parameters:
          index: "{{ server_group }}"
          server_names: "{{ server_ips.split(',') | map('trim') | map('regex_replace', '^.*\\.(\\d+)$', server_name ~ '_\\1') | list }}"

    # -------------------------------------------------------------
    # STEP 3: APPLY AND SAVE CONFIGURATION TO FLASH
    # -------------------------------------------------------------
    - name: Apply changes to Radware Appliance
      radware.radware_modules.alteon_mng_config:
        provider:
          server: "{{ alteon_ip }}"
          user: "{{ radware_username }}"
          password: "{{ radware_password }}"
          validate_certs: false
        command: apply

    - name: Save configuration changes to Flash
      radware.radware_modules.alteon_mng_config:
        provider:
          server: "{{ alteon_ip }}"
          user: "{{ radware_username }}"
          password: "{{ radware_password }}"
          validate_certs: false
        command: save
